name: Tidy Build HackedServer (Gradle)
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        # هنستخدم أوامر Gradle عشان نضمن إن البيلد يشتغل صح
        run: |
          chmod +x gradlew
          ./gradlew build shadowJar --no-daemon

      - name: Organize Files Neatly
        # الخطوة دي هتعمل فولدرات وتفرز الملفات جواها
        run: |
          mkdir -p Output/Spigot
          mkdir -p Output/Velocity
          mkdir -p Output/Core
          
          # سحب الملفات من مجلدات build/libs الخاصة بكل قسم
          find . -path "*/hackedserver-spigot/build/libs/*.jar" -exec cp {} Output/Spigot/ \; || true
          find . -path "*/hackedserver-velocity/build/libs/*.jar" -exec cp {} Output/Velocity/ \; || true
          find . -path "*/hackedserver-core/build/libs/*.jar" -exec cp {} Output/Core/ \; || true

      - name: Upload Clean Package
        uses: actions/upload-artifact@v4
        with:
          name: HackedServer-Organized-Files
          path: Output/
