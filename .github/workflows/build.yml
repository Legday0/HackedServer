name: Build HackedServer
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Shade
        # الأمر ده هيجبر النظام يدمج كل الموديلات في ملف واحد
        run: |
          chmod +x gradlew
          ./gradlew :hackedserver-spigot:build :hackedserver-core:build
          ./gradlew :hackedserver-spigot:shadowJar

      - name: Upload Final Jar
        uses: actions/upload-artifact@v4
        with:
          name: HackedServer-Merg-Fixed
          # هناخد الملف اللي طلع من فولدر الـ spigot تحديداً بعد الدمج
          path: "hackedserver-spigot/build/libs/*-all.jar"
