name: Build HackedServer Organized
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        # الأمر ده بيطلع النسخة الكاملة (Shadow) لكل الأقسام
        run: |
          chmod +x gradlew
          ./gradlew clean shadowJar --no-daemon

      - name: Organize Artifacts
        # هنا بنرتب الملفات في مجلدات واضحة ومنفصلة
        run: |
          mkdir -p output/spigot
          mkdir -p output/velocity
          
          # بنسحب ملفات الـ all.jar لأنها هي النسخ الشغالة والكاملة
          cp hackedserver-spigot/build/libs/*-all.jar output/spigot/ || true
          cp hackedserver-velocity/build/libs/*-all.jar output/velocity/ || true

      - name: Upload Files
        uses: actions/upload-artifact@v4
        with:
          name: HackedServer-Final-Pack
          path: output/
