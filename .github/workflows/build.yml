name: Build HackedServer
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Shaded Jar
        # الأمر ده بيجبر Gradle إنه يدمج الـ Core مع الـ Spigot في ملف واحد
        run: |
          chmod +x gradlew
          ./gradlew :hackedserver-spigot:shadowJar

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: HackedServer-Final
          path: "hackedserver-spigot/build/libs/*-all.jar"
