name: Build HackedServer Separate
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build All Modules
        # هينفذ الـ Build على المشروع بالكامل وكل موديول هيطلع ملفه الخاص
        run: mvn clean package -DskipTests

      - name: Upload Spigot Version
        uses: actions/upload-artifact@v4
        with:
          name: HackedServer-Spigot
          path: "hackedserver-spigot/target/*.jar"

      - name: Upload Velocity Version
        uses: actions/upload-artifact@v4
        with:
          name: HackedServer-Velocity
          path: "hackedserver-velocity/target/*.jar"

      - name: Upload Core Version
        uses: actions/upload-artifact@v4
        with:
          name: HackedServer-Core
          path: "hackedserver-core/target/*.jar"
