name: Build HackedServer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant permission for gradlew
        run: chmod +x gradlew

      - name: Build Paper
        run: ./gradlew :paper:build -x test

      - name: Build Velocity
        run: ./gradlew :velocity:build -x test

      - name: Upload Paper Jar
        uses: actions/upload-artifact@v4
        with:
          name: paper-jar
          path: paper/build/libs/*.jar

      - name: Upload Velocity Jar
        uses: actions/upload-artifact@v4
        with:
          name: velocity-jar
          path: velocity/build/libs/*.jar
