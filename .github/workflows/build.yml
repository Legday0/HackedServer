name: Build HackedServer Final
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build All Modules
        # الأمر ده هيدور على كل ملف pom.xml في المشروع ويشغله بالترتيب الصح
        run: |
          mvn clean package -DskipTests

      - name: Upload Velocity & Spigot Jars
        uses: actions/upload-artifact@v4
        with:
          name: HackedServer-Final-Jars
          # هنا بناخد أي ملف Jar طلع في أي مجلد target عشان نضمن وصولنا للـ Velocity
          path: "**/target/*.jar"
